name: FastAPI CI/CD with ECR

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate version
      id: version
      run: echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ steps.version.outputs.version }}
      run: |
        docker buildx create --use
        docker buildx build \
          --platform linux/amd64 \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          --push .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2 (docker-compose)
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << EOF

        cd ~/app || mkdir ~/app && cd ~/app

        # docker-compose.yml 생성
        cat > docker-compose.yml <<EOL
        services:
          web:
            image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
            container_name: fastapi-app
            ports:
              - "8000:8000"
            restart: always
            depends_on:
              - db
            environment:
              DB_HOST: db
              DB_USER: root
              DB_PASSWORD: pass
              DB_NAME: testdb

          db:
            image: mysql:8
            container_name: mysql-db
            restart: always
            environment:
              MYSQL_ROOT_PASSWORD: pass
              MYSQL_DATABASE: testdb
            ports:
              - "3306:3306"
            volumes:
              - mysql-data:/var/lib/mysql

        volumes:
          mysql-data:
        EOL

        # AWS 인증 파일 생성 (이거 추가 중요)
        mkdir -p ~/.aws
        echo "[default]
        aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
        region=${{ secrets.AWS_REGION }}" > ~/.aws/credentials

        # ECR 로그인
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
        docker login --username AWS --password-stdin ${ECR_REGISTRY}

        # docker-compose 실행
        docker-compose pull
        docker-compose down
        docker-compose up -d

        # 정리
        docker image prune -f

        EOF