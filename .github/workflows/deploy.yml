name: FastAPI Docker CI/CD

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

        cd ~/app || mkdir ~/app && cd ~/app

        if [ ! -d "Layered-Architecture-Server" ]; then
          git clone https://github.com/jspark2504/Layered-Architecture-Server.git
        fi

        cd Layered-Architecture-Server

        git pull origin master

        docker rm -f fastapi-server || true

        docker build -t fastapi-server .

        docker run -d -p 8000:8000 --name fastapi-server fastapi-server

        docker image prune -f

        EOF
